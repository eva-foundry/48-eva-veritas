name: veritas-gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  mti-gate:
    name: EVA Veritas MTI Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history for commit evidence mining)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run veritas audit
        id: audit
        run: node src/cli.js audit --repo . --threshold 70
        continue-on-error: true

      - name: Run test suite
        run: npm test

      - name: Upload .eva/ artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eva-veritas-report
          path: .eva/
          if-no-files-found: warn

      - name: Post MTI score as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## EVA Veritas MTI Report\n\n';

            try {
              const trust = JSON.parse(fs.readFileSync('.eva/trust.json', 'utf8'));
              const score   = trust.score ?? 'N/A';
              const actions = (trust.actions || []).join(', ');
              const delta   = trust.sparkline_delta || '';
              body += `| Score | Actions | Delta |\n|---|---|---|\n`;
              body += `| **${score}** | ${actions} | ${delta} |\n\n`;
              if (trust.sparkline && trust.sparkline.includes('->')) {
                body += `**Trend:** \`${trust.sparkline}\`\n\n`;
              }
            } catch (e) {
              body += `_Could not read trust.json: ${e.message}_\n`;
            }

            try {
              const recon = JSON.parse(fs.readFileSync('.eva/reconciliation.json', 'utf8'));
              const gaps  = (recon.gaps || []).filter(g => g.type !== 'orphan_story_tag');
              if (gaps.length > 0) {
                body += `### Gaps (${gaps.length})\n`;
                for (const g of gaps.slice(0, 10)) {
                  body += `- \`${g.story_id}\` ${g.title || ''} -- ${g.type}\n`;
                }
                if (gaps.length > 10) body += `_...and ${gaps.length - 10} more_\n`;
              } else {
                body += '### Gaps\n_None detected_\n';
              }

              if (Array.isArray(recon.features) && recon.features.length > 0) {
                body += '\n### Feature Breakdown\n| Feature | MTI | Artifacts | Evidence | Gaps |\n|---|---|---|---|---|\n';
                for (const f of recon.features.slice(0, 15)) {
                  body += `| ${f.id} ${f.title || ''} | ${f.mti} | ${f.stories_with_artifacts}/${f.story_count} | ${f.stories_with_evidence}/${f.story_count} | ${f.gap_count} |\n`;
                }
              }
            } catch (e) {
              body += `_Could not read reconciliation.json_\n`;
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Enforce threshold (fail job if audit failed)
        if: steps.audit.outcome == 'failure'
        run: exit 1
